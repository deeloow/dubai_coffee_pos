name: dubai_coffee_pos
description: Dubai Coffee POS System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  provider: ^6.1.2
  cupertino_icons: ^1.0.6
  google_fonts: ^6.2.1
  intl: ^0.19.0
  shared_preferences: ^2.2.3
  uuid: ^4.4.0
  pdf: ^3.11.0
  printing: ^5.14.0
  path_provider: ^2.1.3
  fl_chart: ^0.67.0
  permission_handler: ^11.0.0
  file_picker: ^11.0.2

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1

flutter:
  uses-material-design: true
  assets:
    - assets/icon.png

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon.png"
  min_sdk_android: 21
  windows:
    generate: true
  macos:
    generate: true
  linux:
    generate: true
  web:
    generate: true
    image_path: "assets/icon.png"
